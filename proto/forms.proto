syntax = "proto3";

enum FieldType {
    TEXT = 0;
    TEXTAREA = 1;
    NUMBER = 2;
    SELECT = 3;
    MULTI_SELECT = 4;
    RADIO = 5;
    CHECKBOX = 6;
    DATE = 7;
    TIME = 8;
    EMAIL = 9;
    URL = 10;
}

message Option {
    string label = 1;
    string value = 2;
    uint32 bit = 3; // Bit position (0-63) if using bitmask representation
}

message Options {
    repeated Option options = 1;
    bool use_bitmask = 2; // Indicates if selections should be represented as a bitmask
}

message Form {
    uint64 id = 1;
    string name = 2;
    string description = 3;
    uint64 created_at = 6;
    uint64 updated_at = 9;
    string owner = 7;
    repeated Field fields = 8;
    repeated string allowed_participants = 10;
    repeated string mentioned_emails = 12;
    uint64 deadline = 13;
  
    message Field {
        FieldType type = 1;
        string name = 2;
        string label = 3;
        bool required = 4;
        string placeholder = 9;
        string help_text = 10;
        oneof config {
            int32 max_length = 5;
            string pattern = 6;
            Options select_options = 7;
            NumberConfig number_config = 8;
        }
    }

    message NumberConfig {
        double min = 1;
        double max = 2;
        double step = 3;
    }
}

message FormSubmission {
    uint64 form_id = 1;
    map<string, FieldValue> values = 2;
    uint64 submitted_at = 3;
}

message FieldValue {
    oneof value {
        string string_value = 1;
        int64 integer_value = 2;
        double double_value = 3;
        bool bool_value = 4;
        uint64 bitmask_value = 5;
    }
}

message OtpRequest {
    string email = 1;
    uint64 form_id = 2; // Optional, defaults to 0
}

message OtpVerify {
    string email = 1;
    string code = 2;
    uint64 form_id = 3; // Optional, defaults to 0
}

message BlindSubmission {
    bytes payload = 1;
    bytes signature = 2;
    bytes submission = 3; // Encoded FormSubmission
}

message FormResults {
    repeated FormSubmission submissions = 1;
    Form form = 2;
    uint64 total_submissions = 3;
}

message UserForms {
    repeated Form forms = 1;
}