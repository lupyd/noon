version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: noon-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: noondb
    ports:
      - "39222:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5
    volumes:
      - ./initdb.sql:/docker-entrypoint-initdb.d/init.sql:ro
